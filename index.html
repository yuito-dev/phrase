<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>phrase</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Inter+Tight:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg:          #0C0C0C;
      --surface:     #141414;
      --surface-2:   #1C1C1C;
      --gold:        #C8A84B;
      --gold-dark:   #8A7230;
      --gold-subtle: rgba(200, 168, 75, 0.10);
      --text:        #EDE9DF;
      --text-muted:  #6B6860;
      --border:      #222220;
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: 'Inter Tight', sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      height: 100dvh;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      height: 56px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 26px;
      font-weight: 300;
      letter-spacing: 0.18em;
      color: var(--gold);
    }

    .logo span {
      font-style: italic;
    }

    .header-tag {
      font-size: 10px;
      font-weight: 400;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    /* ── Main two-panel grid ── */
    .main {
      flex: 1;
      display: grid;
      grid-template-rows: 1fr 1fr;
      overflow: hidden;
    }

    /* ── Chat panel ── */
    .chat-panel {
      overflow-y: auto;
      padding: 20px 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      scrollbar-width: none;
    }

    .chat-panel::-webkit-scrollbar { display: none; }

    .chat-date {
      text-align: center;
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 4px;
    }

    .message {
      display: flex;
      align-items: flex-end;
      gap: 10px;
    }

    .message.out {
      flex-direction: row-reverse;
    }

    .avatar {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--surface-2);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-family: 'Cormorant Garamond', serif;
      font-size: 11px;
      color: var(--gold);
      letter-spacing: 0.05em;
    }

    .bubble-col {
      display: flex;
      flex-direction: column;
      gap: 4px;
      max-width: 72%;
    }

    .message.out .bubble-col {
      align-items: flex-end;
    }

    .bubble {
      padding: 10px 14px;
      font-size: 14px;
      line-height: 1.65;
    }

    .message.in .bubble {
      background: var(--surface-2);
      border-radius: 4px 16px 16px 16px;
      color: var(--text);
    }

    .message.out .bubble {
      background: var(--gold);
      color: #0C0C0C;
      border-radius: 16px 4px 16px 16px;
      font-weight: 500;
    }

    .bubble.translation {
      background: var(--gold-subtle);
      border: 1px solid rgba(200, 168, 75, 0.25);
      border-radius: 4px 16px 16px 16px;
      padding: 12px 16px;
    }

    .bubble .en-result {
      font-family: 'Cormorant Garamond', serif;
      font-size: 20px;
      font-style: italic;
      font-weight: 400;
      color: var(--gold);
      letter-spacing: 0.02em;
      line-height: 1.4;
    }

    .bubble .en-label {
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 5px;
    }

    .ts {
      font-size: 10px;
      color: var(--text-muted);
      padding: 0 2px;
    }

    /* ── Input panel ── */
    .input-panel {
      border-top: 1px solid var(--border);
      padding: 20px 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      background: var(--bg);
    }

    .panel-label {
      font-size: 10px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .input-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    textarea {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-family: 'Inter Tight', sans-serif;
      font-size: 15px;
      line-height: 1.6;
      padding: 12px 16px;
      resize: none;
      height: 50px;
      max-height: 110px;
      outline: none;
      transition: border-color 0.2s;
    }

    textarea::placeholder {
      color: var(--text-muted);
    }

    textarea:focus {
      border-color: var(--gold-dark);
    }

    .btn {
      flex-shrink: 0;
      height: 50px;
      padding: 0 22px;
      background: var(--gold);
      color: #0C0C0C;
      border: none;
      border-radius: 12px;
      font-family: 'Inter Tight', sans-serif;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.06em;
      cursor: pointer;
      transition: opacity 0.15s;
      white-space: nowrap;
    }

    .btn:hover  { opacity: 0.82; }
    .btn:active { opacity: 0.65; }

    /* ── Result area ── */
    .result-area {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 18px;
      display: flex;
      align-items: center;
      min-height: 0;
      position: relative;
      overflow: hidden;
    }

    .result-placeholder {
      font-size: 13px;
      color: var(--text-muted);
      letter-spacing: 0.02em;
    }

    .result-en {
      font-family: 'Cormorant Garamond', serif;
      font-size: 24px;
      font-style: italic;
      font-weight: 400;
      color: var(--gold);
      letter-spacing: 0.02em;
      line-height: 1.35;
      display: none;
      animation: fadeUp 0.35s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">phr<span>a</span>se</div>
    <div class="header-tag">English Learning</div>
  </header>

  <div class="main">

    <!-- ── Chat panel ── -->
    <div class="chat-panel" id="chatPanel">
      <div class="chat-date">Today</div>

      <!-- Incoming: prompt -->
      <div class="message in">
        <div class="avatar">AI</div>
        <div class="bubble-col">
          <div class="bubble">
            今日の気持ちを、英語で伝えてみましょう。<br>どんな一日でしたか？
          </div>
          <div class="ts">09:12</div>
        </div>
      </div>

      <!-- Outgoing: user's Japanese -->
      <div class="message out">
        <div class="bubble-col">
          <div class="bubble">今日は本当に疲れた…</div>
          <div class="ts">09:14</div>
        </div>
      </div>

      <!-- Incoming: translation result -->
      <div class="message in">
        <div class="avatar">AI</div>
        <div class="bubble-col">
          <div class="bubble translation">
            <div class="en-label">English</div>
            <div class="en-result">"I'm exhausted today."</div>
          </div>
          <div class="ts">09:14</div>
        </div>
      </div>
    </div>

    <!-- ── Input panel ── -->
    <div class="input-panel">
      <div class="panel-label">今日の一言</div>
      <div class="input-row">
        <textarea id="jpInput" placeholder="日本語で入力…" rows="1"></textarea>
        <button class="btn" onclick="translate()">英訳する</button>
      </div>
      <div class="result-area">
        <div class="result-placeholder" id="placeholder">英訳結果がここに表示されます</div>
        <div class="result-en"         id="resultEn"></div>
      </div>
    </div>

  </div>

  <script>
    function translate() {
      const input = document.getElementById('jpInput').value.trim();
      if (!input) return;

      const placeholder = document.getElementById('placeholder');
      const resultEn    = document.getElementById('resultEn');

      // Stub — replace with AI call later
      const translation = '"I\'m exhausted today."';

      placeholder.style.display = 'none';
      resultEn.style.display    = 'none';
      void resultEn.offsetWidth; // reset animation
      resultEn.textContent      = translation;
      resultEn.style.display    = 'block';
    }

    // Auto-resize textarea
    const ta = document.getElementById('jpInput');
    ta.addEventListener('input', () => {
      ta.style.height = 'auto';
      ta.style.height = Math.min(ta.scrollHeight, 110) + 'px';
    });

    // Enter to translate (Shift+Enter = newline)
    ta.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        translate();
      }
    });
  </script>

</body>
</html>
